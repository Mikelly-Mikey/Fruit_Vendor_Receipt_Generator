version: '3.8'

services:
  mongodb:
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh mongodb:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5
    image: mongo:6-jammy
    container_name: ffruits_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-fruit_vendor_db}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ffruits_network

  app:
    build: .
    container_name: ffruits_app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy  
    environment:
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-admin123}@mongodb:27017/${MONGO_INITDB_DATABASE:-fruit_vendor_db}?authSource=admin
    networks:
      - ffruits_network
    stdin_open: true
    tty: true

volumes:
  mongodb_data:

networks:
  ffruits_network:
    driver: bridge
